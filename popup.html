<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
    rel="stylesheet">
</head>

<body>
  <h2>▶ Enhanced Subtitles</h2>
  <span id="activePlatform" class="platform-badge"></span>
  <div class="preview"><span id="prev">That's amazing.</span></div>

  <div class="row">
    <label>Size</label>
    <input type="range" id="fontSize" min="60" max="250" step="5" value="115">
    <span class="val" id="fontSizeVal">115%</span>
  </div>
  <div class="row">
    <label>Text color</label>
    <input type="color" id="color" value="#ffffff">
  </div>
  <div class="row">
    <label>Outline</label>
    <input type="range" id="outlineWidth" min="0" max="8" step="0.5" value="2.5">
    <span class="val" id="outlineWidthVal">2.5px</span>
  </div>
  <div class="row">
    <label>Outline color</label>
    <input type="color" id="outlineColor" value="#000000">
  </div>

  <div class="toggle">
    <label>Bold</label>
    <label class="sw"><input type="checkbox" id="bold"><span class="sl"></span></label>
  </div>
  <div class="toggle">
    <label>Remove default BG</label>
    <label class="sw"><input type="checkbox" id="removeDefaultBackground" checked><span class="sl"></span></label>
  </div>

  <hr>
  <div class="btns">
    <button id="save">Save</button>
    <button id="reset">Reset</button>
  </div>
  <script src="popup.js"></script>
</body>

</html>
